<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillExa - Evaluation Studio</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/animation.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container" style="justify-content:center; align-items:center; padding:1rem;">
        <div class="card-glass" style="width:100%; max-width:680px; padding:2rem; display:flex; flex-direction:column; gap:1.5rem;">
            <header style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <span style="font-weight:700; color:var(--primary); font-size:0.875rem;">Question 03 of 10</span>
                    <h2 style="font-size:1.25rem; margin-top:0.25rem;">Data Structure Identification</h2>
                </div>
                <div style="padding:0.5rem 1rem; background:rgba(239,68,68,0.1); color:var(--danger); border-radius:var(--radius-sm); font-weight:700;">
                    <i class="far fa-clock"></i> <span id="quiz-countdown-timer">14:59</span>
                </div>
            </header>

            <div class="quiz-question-body" style="font-size:1.1rem; line-height:1.5; font-weight:500;">
                Which primitive data collection notation pattern directly enforces absolute value uniqueness criteria upon definition?
            </div>

            <div class="quiz-options-list" style="display:flex; flex-direction:column; gap:0.75rem;">
                <label style="display:flex; align-items:center; gap:1rem; padding:1rem; border:1px solid var(--border); border-radius:var(--radius-md); cursor:pointer; transition:var(--transition-smooth);">
                    <input type="radio" name="quiz-selection" value="A" style="accent-color:var(--primary);">
                    <span>Lists Arrays Notation (<code>[]</code>)</span>
                </label>
                <label style="display:flex; align-items:center; gap:1rem; padding:1rem; border:1px solid var(--border); border-radius:var(--radius-md); cursor:pointer; transition:var(--transition-smooth);">
                    <input type="radio" name="quiz-selection" value="B" style="accent-color:var(--primary);">
                    <span>Sets Unique Enforcer Matrix (<code>set()</code>)</span>
                </label>
                <label style="display:flex; align-items:center; gap:1rem; padding:1rem; border:1px solid var(--border); border-radius:var(--radius-md); cursor:pointer; transition:var(--transition-smooth);">
                    <input type="radio" name="quiz-selection" value="C" style="accent-color:var(--primary);">
                    <span>Immutable Core Tuple Segments (<code>()</code>)</span>
                </label>
            </div>

            <footer style="display:flex; justify-content:space-between; align-items:center; margin-top:1rem; border-top:1px solid var(--border); padding-top:1.5rem;">
                <button style="background:none; border:1px solid var(--border); padding:0.75rem 1.5rem; border-radius:var(--radius-sm); font-weight:600; cursor:pointer; color:var(--text-muted);">Previous</button>
                <button id="quiz-submit-action" style="background:var(--primary-gradient); color:white; border:none; padding:0.75rem 2rem; border-radius:var(--radius-sm); font-weight:600; cursor:pointer;">Submit Evaluation</button>
            </footer>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/quiz.js"></script>
</body>
</html>
