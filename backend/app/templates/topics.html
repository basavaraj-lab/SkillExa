<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillExa - Learning Paths & Topics</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/animation.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Reusable Application Sidebar Module Template mapping structural hooks -->
        <aside class="sidebar">
            <div class="logo-container" style="padding: 2rem; display: flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-graduation-cap" style="color: var(--primary); font-size: 1.5rem;"></i>
                <span class="logo-text" style="font-weight:700; font-size: 1.25rem;">SkillExa</span>
            </div>
            <nav class="nav-menu" style="display:flex; flex-direction:column; gap:0.5rem; padding: 0 1rem;">
                <a href="/dashboard" class="nav-item" style="display:flex; align-items:center; gap:1rem; padding:1rem; border-radius:var(--radius-md); text-decoration:none; color: var(--text-muted);"><i class="fas fa-columns"></i><span class="link-text">Dashboard</span></a>
                <a href="/topics" class="nav-item active" style="display:flex; align-items:center; gap:1rem; padding:1rem; border-radius:var(--radius-md); text-decoration:none; color: var(--primary); background: rgba(37,99,235,0.08);"><i class="fas fa-book-open"></i><span class="link-text">Topics</span></a>
                <a href="/quiz" class="nav-item" style="display:flex; align-items:center; gap:1rem; padding:1rem; border-radius:var(--radius-md); text-decoration:none; color: var(--text-muted);"><i class="fas fa-vial"></i><span class="link-text">Quizzes</span></a>
                <a href="progress.html" class="nav-item" style="display:flex; align-items:center; gap:1rem; padding:1rem; border-radius:var(--radius-md); text-decoration:none; color: var(--text-muted);"><i class="fas fa-chart-line"></i><span class="link-text">Progress</span></a>
            </nav>
        </aside>

        <main class="main-content animate-fade-in">
            <header class="navbar">
                <div>
                    <h1>Python Syllabus</h1>
                    <p style="color:var(--text-muted);">Master fundamental concepts down to advanced programmatic principles.</p>
                </div>
                <button class="theme-toggle-trigger" style="background:none; border:none; color:var(--text-main); font-size:1.25rem; cursor:pointer;"><i class="fas fa-moon"></i></button>
            </header>

            <!-- Dynamic DOM Mounting Node for JavaScript API Integration Render -->
            <div id="topics-target-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:1.5rem;">
                <!-- Skeleton injection nodes populated dynamically by programmatic logic controllers -->
            </div>
        </main>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/topics.js"></script>

    
</body>
</html>
