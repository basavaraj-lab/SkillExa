<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillExa - Learning Command Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/animation.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Persistent Application Sidebar -->
        <aside class="sidebar">
            <div class="logo-container" style="padding: 2rem; display: flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-graduation-cap style-icon" style="color: var(--primary); font-size: 1.5rem;"></i>
                <span class="logo-text" style="font-weight:700; font-size: 1.25rem;">SkillExa</span>
            </div>
            <nav class="nav-menu" style="display:flex; flex-direction:column; gap:0.5rem; padding: 0 1rem;">
                <a href="/dashboard" class="nav-item active" style="display:flex; align-items:center; gap:1rem; padding:1rem; border-radius:var(--radius-md); text-decoration:none; color: var(--primary); background: rgba(37,99,235,0.08);"><i class="fas fa-columns"></i><span class="link-text">Dashboard</span></a>
                <a href="/topics" class="nav-item" style="display:flex; align-items:center; gap:1rem; padding:1rem; border-radius:var(--radius-md); text-decoration:none; color: var(--text-muted);"><i class="fas fa-book-open"></i><span class="link-text">Topics</span></a>
                <a href="/quiz" class="nav-item" style="display:flex; align-items:center; gap:1rem; padding:1rem; border-radius:var(--radius-md); text-decoration:none; color: var(--text-muted);"><i class="fas fa-vial"></i><span class="link-text">Quizzes</span></a>
                <a href="progress.html" class="nav-item" style="display:flex; align-items:center; gap:1rem; padding:1rem; border-radius:var(--radius-md); text-decoration:none; color: var(--text-muted);"><i class="fas fa-chart-line"></i><span class="link-text">Progress</span></a>
                <a href="profile.html" class="nav-item" style="display:flex; align-items:center; gap:1rem; padding:1rem; border-radius:var(--radius-md); text-decoration:none; color: var(--text-muted);"><i class="fas fa-user-circle"></i><span class="link-text">Profile</span></a>
            </nav>
        </aside>

        <!-- Main Workspace Frame Layout -->
        <main class="main-content animate-fade-in">
            <header class="navbar">
                <div class="welcome-heading">
                    <h1>Welcome Back, Pythonista!</h1>
                    <p style="color: var(--text-muted);">Continue where you left off and hit your daily milestone goals.</p>
                </div>
                <div class="action-utilities" style="display:flex; gap:1.5rem; align-items:center;">
                    <button class="theme-toggle-trigger" style="background:none; border:none; color:var(--text-main); font-size:1.25rem; cursor:pointer;"><i class="fas fa-moon"></i></button>
                    <div class="user-avatar-badge" style="display:flex; align-items:center; gap:0.75rem;">
                        <div style="width:40px; height:40px; border-radius:50%; background:var(--primary-gradient);"></div>
                    </div>
                </div>
            </header>

            <!-- Dashboard Analytics & Overview Layout Block -->
            <section class="grid-dashboard" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem;">
                <div class="card-glass shadow-layer">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <span style="color:var(--text-muted); font-size:0.875rem;">Daily Fire Streak</span>
                            <h2 style="font-size:2rem; margin-top:0.25rem;">12 Days</h2>
                        </div>
                        <i class="fas fa-fire streak-active-animation" style="color: var(--warning); font-size: 2.25rem;"></i>
                    </div>
                </div>
                <div class="card-glass">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <span style="color:var(--text-muted); font-size:0.875rem;">Platform Experience</span>
                            <h2 style="font-size:2rem; margin-top:0.25rem;">2,450 XP</h2>
                        </div>
                        <i class="fas fa-star" style="color: #65A30D; font-size: 2.25rem;"></i>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
